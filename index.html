<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports TV</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#141414;
display:flex;
flex-direction:column;
}

.logo{
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #333;
}

.search{
padding:10px;
border:none;
outline:none;
margin:10px;
border-radius:5px;
}

.channels{
flex:1;
overflow-y:auto;
padding:10px;
}

.channel{
padding:10px;
margin-bottom:8px;
background:#1d1d1d;
border-radius:6px;
cursor:pointer;
}

.channel:hover{
background:#ff3030;
}

/* PLAYER */

.player-area{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
background:#181818;
padding:10px;
display:flex;
gap:10px;
}

button{
background:#ff3030;
border:none;
color:white;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff0000;
}

.player{
flex:1;
background:black;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
SPORTS TV
</div>

<input class="search" placeholder="Buscar canal..." onkeyup="buscar(this.value)">

<div class="channels" id="channels">

</div>

</div>

<div class="player-area">

<div class="topbar">

<button onclick="fullscreen()">Full Screen</button>

<button onclick="reload()">Recargar</button>

<button onclick="share()">Compartir</button>

</div>

<div class="player">

<iframe
id="player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allowfullscreen
referrerpolicy="no-referrer">
</iframe>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
