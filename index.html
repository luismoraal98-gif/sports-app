<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports App</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px;
}

button{
padding:12px;
background:#1f1f1f;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#333;
}

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
height:45vh;
background:black;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<header>
SPORTS TV
</header>

<div class="channels">

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/espn.html')">ESPN</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/espn2.html')">ESPN 2</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/espn3.html')">ESPN 3</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/espnpremium.html')">ESPN Premium</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/tntsports.html')">TNT Sports</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/tudn.html')">TUDN</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/foxsports2.html')">Fox Sports 2</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/foxsports3.html')">Fox Sports 3</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/tycsports.html')">TyC Sports</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/directvsports.html')">DirecTV Sports</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/directvsports2.html')">DirecTV Sports 2</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/winsports.html')">Win Sports</button>

<button onclick="play('https://embed.ksdjugfsddeports.com/embed2/winsportsplus.html')">Win Sports+</button>

</div>

<div class="player">
<iframe id="player" allowfullscreen allow="autoplay"></iframe>
</div>

<script>

function play(url){
document.getElementById("player").src=url;
}

</script>

</body>
</html>
