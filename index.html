<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports TV</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#111;
overflow-y:auto;
border-right:1px solid #222;
}

.sidebar h2{
text-align:center;
padding:15px;
margin:0;
border-bottom:1px solid #222;
}

.channel{
padding:15px;
cursor:pointer;
border-bottom:1px solid #1d1d1d;
}

.channel:hover{
background:#1e1e1e;
}

/* PLAYER */

.player{
flex:1;
position:relative;
background:black;
}

.player iframe{
width:100%;
height:100%;
border:0;
}

/* FULLSCREEN BUTTON */

.fullscreen{
position:absolute;
bottom:20px;
right:20px;
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Canales</h2>

<div class="channel" onclick="playChannel('https://embed.ksdjugfsddeports.com/embed2/tntsports.html')">
TNT Sports
</div>

<div class="channel" onclick="playChannel('https://embed.ksdjugfsddeports.com/espnpremium.php')">
ESPN Premium
</div>

<div class="channel" onclick="playChannel('https://embed.ksdjugfsddeports.com/embed2/espn.html')">
ESPN
</div>

<div class="channel" onclick="playChannel('https://embed.ksdjugfsddeports.com/embed2/foxsports.html')">
Fox Sports
</div>

</div>

<div class="player">

<iframe
id="player"
src="https://embed.ksdjugfsddeports.com/embed2/tntsports.html"
allowfullscreen
sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
></iframe>

<button class="fullscreen" onclick="fullscreen()">
Pantalla completa
</button>

</div>

</div>

<script>

function playChannel(url){

document.getElementById("player").src = url

}

function fullscreen(){

let iframe = document.getElementById("player")

if(iframe.requestFullscreen){

iframe.requestFullscreen()

}else if(iframe.webkitRequestFullscreen){

iframe.webkitRequestFullscreen()

}

}

</script>

<script src="app.js"></script>

</body>
</html>
